<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batarya SOH Tahmin Sistemi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #fff;
            min-height: 100vh;
            padding: 30px;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 10px;
            color: #00d4ff;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 40px;
        }

        .container { max-width: 800px; margin: 0 auto; }

        .card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid #2a2a4a;
        }

        .card h2 {
            margin-bottom: 20px;
            color: #00d4ff;
            font-size: 1.2rem;
        }

        .inputs-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 0.75rem; color: #888; }
        .input-group input {
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            padding: 10px;
            color: #fff;
            font-size: 1rem;
            text-align: center;
            width: 100%;
        }
        .input-group input:focus { outline: none; border-color: #00d4ff; }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.85; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .result-card {
            display: none;
            background: #1a1a2e;
            border-radius: 16px;
            padding: 30px;
            border: 1px solid #2a2a4a;
        }

        .result-card h2 {
            color: #00d4ff;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .metric-box {
            background: #0f0f1a;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid #2a2a4a;
        }

        .metric-label { font-size: 0.85rem; color: #888; margin-bottom: 8px; }
        .metric-value { font-size: 2.5rem; font-weight: bold; color: #00d4ff; }
        .metric-unit { font-size: 0.9rem; color: #888; margin-top: 4px; }

        .durum-box {
            text-align: center;
            font-size: 1.4rem;
            margin-bottom: 20px;
            padding: 15px;
            background: #0f0f1a;
            border-radius: 12px;
        }

        .bar-container {
            background: #0f0f1a;
            border-radius: 10px;
            height: 24px;
            margin: 15px 0;
            overflow: hidden;
            position: relative;
        }

        .bar {
            height: 100%;
            border-radius: 10px;
            transition: width 1s ease;
            background: linear-gradient(90deg, #ff4444, #ffaa00, #00ff88);
        }

        .bar-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 5px;
        }

        .eol-badge {
            display: inline-block;
            padding: 10px 25px;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 10px;
            width: 100%;
            text-align: center;
        }
        .eol-ok { background: #1a4a1a; color: #00ff88; }
        .eol-warn { background: #4a1a1a; color: #ff4444; }

        .error { color: #ff4444; text-align: center; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔋 Batarya SOH Tahmin Sistemi</h1>
        <p class="subtitle">Son 10 döngünün SOH değerlerini girin, yapay zeka analiz etsin</p>

        <div class="card">
            <h2>📊 SOH Geçmişi Girin (%)</h2>
            <div class="inputs-grid" id="inputs"></div>
            <button onclick="predict()" id="btn">🔍 Tahmin Et</button>
            <p class="error" id="error"></p>
        </div>

        <div class="result-card" id="result">
            <h2>📈 Analiz Sonucu</h2>
            
            <div class="metrics-grid">
                <div class="metric-box">
                    <div class="metric-label">Tahmini SOH</div>
                    <div class="metric-value" id="soh-val">-</div>
                    <div class="metric-unit">% Sağlık</div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">Kalan Ömür (RUL)</div>
                    <div class="metric-value" id="rul-val">-</div>
                    <div class="metric-unit">döngü</div>
                </div>
            </div>

            <div class="durum-box" id="durum">-</div>

            <div class="bar-labels">
                <span>Kritik</span>
                <span>Dikkat</span>
                <span>İyi</span>
                <span>Mükemmel</span>
            </div>
            <div class="bar-container">
                <div class="bar" id="bar" style="width:0%"></div>
            </div>

            <div class="eol-badge" id="eol-badge">-</div>
        </div>
    </div>

    <script>
        const grid = document.getElementById('inputs');
        for (let i = 0; i < 10; i++) {
            grid.innerHTML += `
                <div class="input-group">
                    <label>Döngü ${i+1}</label>
                    <input type="number" id="soh${i}" min="0" max="100" 
                           value="${100 - i}" step="0.1">
                </div>`;
        }

        async function predict() {
            const btn = document.getElementById('btn');
            const error = document.getElementById('error');
            error.textContent = '';

            const values = [];
            for (let i = 0; i < 10; i++) {
                const val = parseFloat(document.getElementById(`soh${i}`).value);
                if (isNaN(val) || val < 0 || val > 100) {
                    error.textContent = '⚠️ Lütfen 0-100 arasında geçerli değerler girin!';
                    return;
                }
                values.push(val);
            }

            btn.disabled = true;
            btn.textContent = '⏳ Analiz ediliyor...';

            try {
                const response = await fetch('http://127.0.0.1:8000/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ soh_history: values })
                });

                const data = await response.json();

                document.getElementById('result').style.display = 'block';
                document.getElementById('soh-val').textContent = data.tahmin_soh;
                document.getElementById('rul-val').textContent = data.rul === 999 ? '999+' : data.rul;
                document.getElementById('durum').textContent = data.durum;
                document.getElementById('bar').style.width = data.tahmin_soh + '%';

                const eolBadge = document.getElementById('eol-badge');
                if (data.eol_gecildi) {
                    eolBadge.textContent = '⚠️ EOL Sınırı Aşıldı — Batarya Değişimi Önerilir!';
                    eolBadge.className = 'eol-badge eol-warn';
                } else {
                    eolBadge.textContent = '✅ EOL Sınırı İçinde — Batarya Sağlıklı';
                    eolBadge.className = 'eol-badge eol-ok';
                }

            } catch (err) {
                error.textContent = '❌ API bağlantısı kurulamadı. Sunucu çalışıyor mu?';
            }

            btn.disabled = false;
            btn.textContent = '🔍 Tahmin Et';
        }
    </script>
</body>
</html>
